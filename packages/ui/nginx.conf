server {
  listen 80;
  server_name _;

  # Root points to the built Vite app
  root /usr/share/nginx/html;
  index index.html;

  # Serve static files with long cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|otf)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # Proxy API calls to the core API service in the same Docker network
  location /api/ {
    proxy_pass http://core-api:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback to index.html for client-side routing
  location / {
    try_files $uri /index.html;
  }
}
