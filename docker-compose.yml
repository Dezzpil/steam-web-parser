services:
  db:
    image: postgres:14
    container_name: steam-parser-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dumps:/var/dumps
    networks:
      - steam-parser-network

  core-api:
    build:
      context: .
      dockerfile: packages/core/Dockerfile
    container_name: steam-parser-core-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      PORT: ${PORT:-3000}
      # Optional Prisma debug
      # DEBUG: prisma:query
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
    networks:
      - steam-parser-network

  core-ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    container_name: steam-parser-core-ui
    depends_on:
      - core-api
    ports:
      - "${UI_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - steam-parser-network

networks:
  steam-parser-network:
    name: steam-parser-network
    driver: bridge
    external: true

volumes:
  postgres_data:
