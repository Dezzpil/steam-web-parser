services:
  db:
    image: postgres:14
    container_name: steam-parser-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dumps:/var/dumps
    networks:
      - steam-parser-network

  core-api:
    build:
      context: .
      dockerfile: packages/core/Dockerfile
    container_name: steam-parser-core-api
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${API_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - steam-parser-network

  core-ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    container_name: steam-parser-core-ui
    depends_on:
      - core-api
    ports:
      - "${UI_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - steam-parser-network

networks:
  steam-parser-network:
    name: steam-parser-network
    driver: bridge
    external: true

volumes:
  postgres_data:
